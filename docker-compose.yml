services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
    volumes:
      - ./backend:/var/www/html

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/var/www/html

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hivefinance
      POSTGRES_USER: hivefinance_app
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivefinance_app -d hivefinance"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  frontend_node_modules:
